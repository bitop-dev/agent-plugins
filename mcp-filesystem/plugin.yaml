apiVersion: agent/v1
kind: Plugin
metadata:
  name: mcp-filesystem
  version: 0.1.0
  description: MCP bridge plugin for the official filesystem MCP server

spec:
  category: bridge
  runtime:
    type: mcp
    command:
      - npx
      - -y
      - "@modelcontextprotocol/server-filesystem"
      - /tmp

  contributes:
    tools: []
    prompts: []
    profileTemplates:
      - id: mcp/filesystem-researcher
        path: profiles/researcher.yaml
    policies: []

  configSchema:
    type: object
    properties:
      command:
        type: array
      allowedPaths:
        type: array
    required: []

  permissions:
    network:
      outbound: []
    sensitiveActions:
      - write_file
      - create_directory
      - move_file

  requires:
    framework: ">=0.1.0"
    plugins: []

apiVersion: agent/v1
kind: Profile
metadata:
  name: mcp-filesystem-researcher
  version: 0.1.0
  description: Profile template for filesystem research via MCP
spec:
  instructions:
    system:
      - ./prompts/system.md
  provider:
    default: openai
    model: nemotron-3-super-120b-a12b
  tools:
    enabled:
      - read_file
      - list_directory
      - search_files
  approval:
    mode: on-request
    requireFor:
      - write_file
  workspace:
    required: false
    writeScope: read-only
  session:
    persistence: sqlite
    compaction: auto
  policy:
    overlays: []

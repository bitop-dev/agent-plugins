apiVersion: agent/v1
kind: Plugin
metadata:
  name: ddg-research
  version: 0.1.0
  description: Real web search via DuckDuckGo HTML and page content fetching
spec:
  category: integration
  runtime:
    type: command
    command: ["./bin/web-tool"]
  contributes:
    tools:
      - id: ddg/search
        path: tools/search.yaml
      - id: ddg/fetch
        path: tools/fetch.yaml
    prompts: []
    profileTemplates: []
    policies: []
  configSchema:
    type: object
    properties: {}
    required: []
  permissions:
    network:
      outbound:
        - https
  requires:
    framework: ">=0.1.0"
    plugins: []

id: ddg/search
kind: tool
description: Search the web using DuckDuckGo and return real results with titles, URLs, and snippets. Use timeRange to filter results by recency.
inputSchema:
  type: object
  properties:
    query:
      type: string
      description: Search query — do not include time words like "recent" or "this week" here, use timeRange instead
    topK:
      type: integer
      description: Number of results to return (default 5, max 10)
    timeRange:
      type: string
      enum: [day, week, month, year]
      description: Filter results by recency — "week" for news from the past 7 days, "month" for past 30 days
  required:
    - query
execution:
  mode: command
  operation: search
  timeout: 20
risk:
  level: low

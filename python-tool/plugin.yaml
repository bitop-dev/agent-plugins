apiVersion: agent/v1
kind: Plugin
metadata:
  name: python-tool
  version: 0.1.0
  description: Example command plugin using a Python script with JSON-stdin/stdout
spec:
  category: integration
  runtime:
    type: command
    command: ["python3", "scripts/tool.py"]
  contributes:
    tools:
      - id: py/word-count
        path: tools/word-count.yaml
    prompts: []
    profileTemplates: []
    policies: []
  configSchema:
    type: object
    properties: {}
    required: []
  permissions:
    network:
      outbound: []
  requires:
    framework: ">=0.1.0"
    plugins: []

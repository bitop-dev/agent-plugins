apiVersion: agent/v1
kind: Profile
metadata:
  name: email-local
  version: 0.1.0
  description: Local test profile for the send-email plugin
spec:
  instructions:
    system:
      - ./prompts/system.md
  provider:
    default: mock
    model: echo
  tools:
    enabled:
      - email/draft
      - email/send
  approval:
    mode: on-request
    requireFor:
      - email/send
  workspace:
    required: false
    writeScope: read-only
  session:
    persistence: sqlite
    compaction: auto
  policy:
    overlays: []

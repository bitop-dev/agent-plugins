apiVersion: agent/v1
kind: Profile
metadata:
  name: grafana-weekly-summary-template
  version: 0.1.0
  description: Template for weekly Grafana ops summary emails
spec:
  instructions:
    system:
      - grafana/ops-analyst
  provider:
    default: openai
    model: gpt-oss-120b
  tools:
    enabled:
      - grafana/alert-events
      - grafana/query-metrics
      - grafana/query-logs
      - grafana/datasources
      - email/send
  approval:
    mode: always
  workspace:
    required: false
    writeScope: read-only
  session:
    persistence: sqlite
    compaction: auto
  policy:
    overlays: []

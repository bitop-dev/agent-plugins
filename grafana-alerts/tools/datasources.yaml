id: grafana/datasources
kind: tool
description: >
  List Grafana datasources, optionally filtered by type. Use this to find the
  UID needed for grafana/query-metrics and grafana/query-logs. Filter by
  type="prometheus" for Mimir/Prometheus sources, type="loki" for Loki sources.
inputSchema:
  type: object
  properties:
    type:
      type: string
      description: >
        Optional type filter (case-insensitive substring match). Examples:
        "prometheus" — returns all Prometheus and Mimir datasources
        "loki"       — returns all Loki datasources
  required: []
execution:
  mode: command
  operation: datasources
  timeout: 15
risk:
  level: low

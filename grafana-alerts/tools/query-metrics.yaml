id: grafana/query-metrics
kind: tool
description: >
  Run a PromQL range query against a Prometheus or Mimir datasource via the
  Grafana datasource proxy. Returns per-series min/max/avg/last statistics over
  the requested time range. Use grafana/datasources first to find the datasource UID.
inputSchema:
  type: object
  properties:
    datasource_uid:
      type: string
      description: Grafana datasource UID (get from grafana/datasources)
    expr:
      type: string
      description: PromQL expression to evaluate
    from:
      type: string
      description: Start time in RFC3339 format (e.g. "2026-03-13T00:00:00Z")
    to:
      type: string
      description: End time in RFC3339 format (e.g. "2026-03-20T23:59:59Z")
    step:
      type: string
      description: Query step interval (e.g. "5m", "1h"). Auto-calculated if omitted.
  required:
    - datasource_uid
    - expr
execution:
  mode: command
  operation: query-metrics
  timeout: 30
risk:
  level: low

id: grafana/query-logs
kind: tool
description: >
  Run a LogQL query against a Loki datasource via the Grafana datasource proxy.
  Returns log lines with timestamps, error/warning counts, and a text summary.
  Use grafana/datasources to find the datasource UID. Time parameters must be
  RFC3339 format — do not use relative strings like "now-7d".
inputSchema:
  type: object
  properties:
    datasource_uid:
      type: string
      description: Grafana Loki datasource UID (get from grafana/datasources)
    query:
      type: string
      description: >
        LogQL stream selector and optional filter. Examples:
        {cluster="az1-aipe-navigator-k8s-prod"}
        {cluster="az1-aipe-navigator-k8s-prod"} |= "error"
        {namespace="navigator-studentassistant"} | json | level="error"
    from:
      type: string
      description: Start time in RFC3339 format (e.g. "2026-03-13T00:00:00Z")
    to:
      type: string
      description: End time in RFC3339 format (e.g. "2026-03-20T23:59:59Z")
    limit:
      type: integer
      description: Maximum number of log lines to return (default 100)
  required:
    - datasource_uid
    - query
execution:
  mode: command
  operation: query-logs
  timeout: 30
risk:
  level: low

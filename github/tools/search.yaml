id: github/search
description: "Search GitHub for repositories, code, issues, or users"
runtime:
  type: command
  command: ["./bin/github-tool"]
  mode: json-stdin
schema:
  type: object
  properties:
    query:
      type: string
      description: "Search query"
    type:
      type: string
      description: "Search type: repositories, code, issues, users"
      default: "repositories"
    limit:
      type: integer
      description: "Max results (default: 10)"
      default: 10
  required: [query]

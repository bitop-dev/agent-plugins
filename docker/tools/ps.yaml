id: docker/ps
description: "List running Docker containers with status, ports, and image info"
runtime:
  type: command
  command: ["docker-tool"]
  mode: json-stdin
schema:
  type: object
  properties:
    all:
      type: boolean
      description: "Include stopped containers"
      default: false
    filter:
      type: string
      description: "Docker filter (e.g. 'status=running', 'name=web')"

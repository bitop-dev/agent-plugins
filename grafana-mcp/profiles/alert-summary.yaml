apiVersion: agent/v1
kind: Profile
metadata:
  name: grafana-alert-summary-template
  version: 0.1.0
  description: Template profile for Grafana alert summary emails
spec:
  instructions:
    system:
      - grafana/alert-analyst
  provider:
    default: openai
    model: gpt-oss-120b
  tools:
    enabled:
      - list_alert_rules
      - list_incidents
      - email/send
  approval:
    mode: always
  workspace:
    required: false
    writeScope: read-only
  session:
    persistence: sqlite
    compaction: auto
  policy:
    overlays: []

apiVersion: agent/v1
kind: Profile
metadata:
  name: web-local
  version: 0.1.0
  description: Local test profile for the web-research plugin
spec:
  instructions:
    system:
      - ./prompts/system.md
  provider:
    default: mock
    model: echo
  tools:
    enabled:
      - web/search
      - web/fetch
  approval:
    mode: never
    requireFor: []
  workspace:
    required: false
    writeScope: read-only
  session:
    persistence: sqlite
    compaction: auto
  policy:
    overlays: []

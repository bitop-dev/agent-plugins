apiVersion: agent/v1
kind: Plugin
metadata:
  name: web-research
  version: 0.1.0
  description: Web search and fetch plugin example
spec:
  category: integration
  runtime:
    type: http
  contributes:
    tools:
      - id: web/search
        path: tools/search.yaml
      - id: web/fetch
        path: tools/fetch.yaml
    prompts:
      - id: web/research-style
        path: prompts/research-style.md
    profileTemplates:
      - id: web/researcher
        path: profiles/researcher.yaml
    policies:
      - id: web/default
        path: policies/default.yaml
  configSchema:
    type: object
    properties:
      provider:
        type: string
        enum: [tavily, serpapi, internal]
      apiKey:
        type: string
        secret: true
      allowedDomains:
        type: array
    required:
      - provider
  permissions:
    network:
      outbound:
        - https
  requires:
    framework: ">=0.1.0"
    plugins: []

id: gh/repo-view
kind: tool
description: View details of a GitHub repository
inputSchema:
  type: object
  properties:
    repo:
      type: string
      description: Repository in owner/name format
  required:
    - repo
execution:
  mode: command
  argv: ["repo", "view", "{{repo}}", "--json", "name,description,url,stargazerCount,forkCount,isPrivate,defaultBranchRef"]
  timeout: 10
risk:
  level: low
